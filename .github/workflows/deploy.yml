name: Deploy Sink to Cloudflare Workers
on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # 全局环境变量，所有步骤均可读取
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      DEPLOY_ANALYTICS_DATASET: ${{ secrets.DEPLOY_ANALYTICS_DATASET }}
      DEPLOY_KV_NAMESPACE_ID: ${{ secrets.DEPLOY_KV_NAMESPACE_ID }}
      DEPLOY_KV_PREVIEW_NAMESPACE_ID: ${{ secrets.DEPLOY_KV_PREVIEW_NAMESPACE_ID }}
      DEPLOY_D1_DATABASE_NAME: ${{ secrets.DEPLOY_D1_DATABASE_NAME }}
      DEPLOY_D1_DATABASE_ID: ${{ secrets.DEPLOY_D1_DATABASE_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build Sink
        run: pnpm run build

      # 原生shell执行，不再使用cloudflare/wrangler-action
      - name: Install wrangler globally
        run: pnpm add -g wrangler

      - name: Apply D1 Remote Migrations
        run: wrangler d1 migrations apply DB --remote

      - name: Deploy Worker
        run: wrangler deploy
