name: Deploy Sink to Cloudflare Workers
on:
  push:
    branches: [master]
  workflow_dispatch: # 支持网页手动一键部署

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_ANALYTICS_DATASET: ${{ secrets.DEPLOY_ANALYTICS_DATASET }}
      DEPLOY_KV_NAMESPACE_ID: ${{ secrets.DEPLOY_KV_NAMESPACE_ID }}
      DEPLOY_KV_PREVIEW_NAMESPACE_ID: ${{ secrets.DEPLOY_KV_PREVIEW_NAMESPACE_ID }}
      DEPLOY_D1_DATABASE_NAME: ${{ secrets.DEPLOY_D1_DATABASE_NAME }}
      DEPLOY_D1_DATABASE_ID: ${{ secrets.DEPLOY_D1_DATABASE_ID }}
      DEPLOY_R2_PREVIEW_BUCKET_NAME: ${{ secrets.DEPLOY_R2_PREVIEW_BUCKET_NAME }}
      DEPLOY_R2_BUCKET_NAME: ${{ secrets.DEPLOY_R2_BUCKET_NAME }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Build Sink
        run: pnpm run build

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
